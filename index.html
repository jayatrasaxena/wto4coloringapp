<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
	<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        /* 1. THE BOX: Adjust width/height to fit your specific images */
        .viewer-container {
            position: relative;
            width: 100%;       /* Responsive width */
            max-width: 1180px;  /* Set this to your desired display size */
            aspect-ratio: 16/9; /* Forces a square. Change to 3/4 or 4/3 if needed */
            margin: 0 auto;
            border: 1px solid #ddd;
            overflow: hidden;
            background: #f9f9f9;
        }

        /* 2. THE LAYERS: This handles rotation and scaling */
        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; /* Keeps image from stretching ugly */
            
            /* Apply 90deg rotation and 80% scale down */
            transform: rotate(90deg) scale(1.6);
            
            /* Smooth transition when turning on/off */
            transition: opacity 0.3s ease;
        }

        /* 3. THE BUTTONS */
        .controls {
            text-align: center;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

	button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
            background-color: #8E8E93; /* Neutral Gray for OFF */
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            transition: background-color 0.3s;
        }

        /* ACTIVE BUTTON STATE (ON) */
        button.active {
            background-color: #34C759; /* Green for ON */
        }
button.on-layer1 { background-color: #FF0000; } /* Red */
button.on-layer2 { background-color: #0000FF; } /* Blue */
button.on-layer3 { background-color: #00FFFF; } /* Cyan */
button.on-layer4 { background-color: #8B0000; } /* Dark Red */
button.on-layer5 { background-color: #FF8C00; } /* Dark Orange */
button.on-layer6 { background-color: #EE82EE; } /* Violet */
button.on-layer7 { background-color: #008B8B; } /* Dark Cyan */
button.on-layer8 { background-color: #8B008B; } /* Dark Magenta */

        button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
<h1 style="text-align: center; font-family:garamond"> Visualization for the Coloring of \(\omega^4\) </h1>

<div class="viewer-container">
    <img src="layer0.svg" class="layer" id="base">
    
    <img src="layer1.svg" class="layer" id="l1" style="opacity: 0;">
    <img src="layer2.svg" class="layer" id="l2" style="opacity: 0;">
    <img src="layer3.svg" class="layer" id="l3" style="opacity: 0;">
    <img src="layer4.svg" class="layer" id="l4" style="opacity: 0;">
    <img src="layer5.svg" class="layer" id="l5" style="opacity: 0;">
    <img src="layer6.svg" class="layer" id="l6" style="opacity: 0;">
    <img src="layer7.svg" class="layer" id="l7" style="opacity: 0;">
    <img src="layer8.svg" class="layer" id="l8" style="opacity: 0;">
</div>

<div class="controls">
    <button onclick="toggle('l1', this, 'on-layer1')">\( 1 \stackrel{2}{\downarrow} 0 \) </button>
    <button onclick="toggle('l2', this, 'on-layer2')">\( 2 \stackrel{3}{\downarrow} 1 \)</button>
    <button onclick="toggle('l3', this, 'on-layer3')">\( 2 \stackrel{3}{\searrow} 0 \)</button>
    <button onclick="toggle('l4', this, 'on-layer4')">\(2 \stackrel{3}{\swarrow} 0\) </button>
    <button onclick="toggle('l5', this, 'on-layer5')">\( 2 \stackrel{4}{\searrow} 0 \)</button>
    <button onclick="toggle('l6', this, 'on-layer6')">\( 3 \stackrel{4}{\swarrow} 0 \)</button>
    <button onclick="toggle('l7', this, 'on-layer7')">\( 3 \stackrel{4}{\downarrow} 1 \)</button>
    <button onclick="toggle('l8', this, 'on-layer8')">\( 3 \stackrel{4}{\searrow} 2 \)</button>
</div>

<script>
function toggle(layerId, btn, colorClass) {
    const img = document.getElementById(layerId);
    
    if (img.style.opacity === "0" || img.style.opacity === "") {
        img.style.opacity = "1";
        btn.classList.add(colorClass); // Adds the specific color
    } else {
        img.style.opacity = "0";
        btn.classList.remove(colorClass); // Removes the specific color
    }
}
</script>

</body>
</html>
